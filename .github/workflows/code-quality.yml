name: Code Quality

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --only-dev

      - name: Check formatting
        run: uv run ruff format --check neuralogic

      - name: Lint with ruff
        run: uv run ruff check neuralogic

      - name: Type-check with pyright
        run: uv run pyright neuralogic
